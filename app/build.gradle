plugins {
    id 'com.android.application'
}

android {
    namespace 'com.puzzlebot.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.puzzlebot.app"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // Tidak perlu dependensi eksternal — murni Android SDK
    // (tidak pakai OpenCV agar ringan dan cepat)
}
